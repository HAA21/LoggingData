<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Data Logger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: "class" };</script>
</head>
<body class="bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen">
  <div class="max-w-2xl mx-auto px-4 py-6">
    <div class="relative mb-4">
      <h1 class="text-2xl font-bold text-center">Customer Logger</h1>
      <label for="themeToggle" class="absolute right-0 top-1/2 -translate-y-1/2 inline-flex items-center cursor-pointer">
        <span class="sr-only">Toggle theme</span>
        <input id="themeToggle" type="checkbox" class="peer sr-only" />
        <span class="relative h-6 w-11 rounded-full bg-slate-300 dark:bg-slate-600 transition-colors peer-checked:bg-indigo-600">
          <span class="absolute left-0.5 top-0.5 h-5 w-5 rounded-full bg-white transition-transform peer-checked:translate-x-5"></span>
        </span>
      </label>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-4 sm:p-6">
      <form id="entryForm" class="space-y-4">
        <div>
          <label for="date" class="block text-sm font-medium mb-1">Date *</label>
          <input id="date" name="date" type="date" required class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent px-3 py-2" />
        </div>

        <div id="customerField" class="relative">
          <label for="customer_name" class="block text-sm font-medium mb-1">Customer Name *</label>
          <input id="customer_name" name="customer_name" autocomplete="off" required placeholder="Type or choose a customer" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent px-3 py-2 pr-10" />
          <button id="customerToggleBtn" type="button" class="absolute right-2 top-[34px] text-slate-500 dark:text-slate-300 px-2 py-1" aria-label="Show customer options">▼</button>
          <div id="customerSuggestions" class="hidden absolute z-20 mt-1 w-full max-h-56 overflow-auto rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow"></div>
        </div>

        <div>
          <label for="quantity" class="block text-sm font-medium mb-1">Quantity *</label>
          <input id="quantity" name="quantity" type="number" min="0" step="1" required class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent px-3 py-2" />
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block text-sm font-medium">Phone Numbers</label>
            <button type="button" id="addPhoneBtn" class="text-sm px-3 py-1.5 rounded-lg bg-indigo-600 text-white">+ Add Phone</button>
          </div>
          <div id="phoneContainer" class="space-y-2"></div>
        </div>

        <button id="submitBtn" type="submit" class="w-full rounded-lg bg-emerald-600 text-white py-2.5 font-medium">Save Entry</button>
      </form>

      <div id="savingState" class="hidden mt-3 text-sm text-indigo-600 dark:text-indigo-300">Saving entry...</div>
      <div class="mt-3">
        <a id="downloadLink" href="#" class="inline-block rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">Download selected month's file</a>
      </div>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-4 sm:p-6 mt-6">
      <h2 class="text-lg font-semibold mb-3">Last 5 Entries (Current Month)</h2>
      <div id="recentEntries" class="space-y-2 text-sm text-slate-700 dark:text-slate-200"></div>
    </div>
  </div>

  <div id="toast" class="fixed bottom-4 right-4 hidden px-4 py-3 rounded-xl text-white shadow-lg"></div>

  <script>
    const form = document.getElementById("entryForm");
    const dateInput = document.getElementById("date");
    const customerInput = document.getElementById("customer_name");
    const customerField = document.getElementById("customerField");
    const customerToggleBtn = document.getElementById("customerToggleBtn");
    const customerSuggestions = document.getElementById("customerSuggestions");
    const addPhoneBtn = document.getElementById("addPhoneBtn");
    const phoneContainer = document.getElementById("phoneContainer");
    const savingState = document.getElementById("savingState");
    const submitBtn = document.getElementById("submitBtn");
    const downloadLink = document.getElementById("downloadLink");
    const recentEntries = document.getElementById("recentEntries");
    const toast = document.getElementById("toast");
    const themeToggle = document.getElementById("themeToggle");

    let customers = [];
    let customerDropdownOpen = false;
    let hideTimeout = null;
    let typingTimer = null;

    function escapeHtml(v) {
      if (!v) return "";
      return v.toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showToast(message, isError = false) {
      toast.textContent = message;
      toast.className = `fixed bottom-4 right-4 px-4 py-3 rounded-xl text-white shadow-lg ${isError ? "bg-red-600" : "bg-emerald-600"}`;
      toast.classList.remove("hidden");
      setTimeout(() => toast.classList.add("hidden"), 2400);
    }

    function formatApiError(detail) {
      if (Array.isArray(detail)) {
        const first = detail[0];
        if (first?.loc && first?.msg) {
          const field = first.loc[first.loc.length - 1];
          return `${field}: ${first.msg}`;
        }
        return "Validation error";
      }
      if (typeof detail === "string") return detail;
      return "Request failed";
    }

    function createPhoneRow(value = "") {
      const row = document.createElement("div");
      row.className = "flex gap-2";
      const input = document.createElement("input");
      input.type = "text";
      input.value = value;
      input.placeholder = "Phone number";
      input.className = "phone-input flex-1 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent px-3 py-2";
      
      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.textContent = "Remove";
      removeBtn.className = "remove-phone px-3 py-2 rounded-lg bg-rose-600 text-white text-sm";
      removeBtn.addEventListener("click", () => row.remove());
      
      row.appendChild(input);
      row.appendChild(removeBtn);
      phoneContainer.appendChild(row);
    }

    async function loadCustomers() {
      try {
        const res = await fetch("/api/customers");
        if (!res.ok) throw new Error("Failed to load customers");
        const data = await res.json();
        customers = data.customers || [];
      } catch (error) {
        throw new Error("Could not load customers");
      }
    }

    function hideCustomerSuggestions() {
      if (hideTimeout) clearTimeout(hideTimeout);
      hideTimeout = setTimeout(() => {
        customerDropdownOpen = false;
        customerSuggestions.classList.add("hidden");
        customerSuggestions.innerHTML = "";
      }, 200);
    }

    function cancelHide() {
      if (hideTimeout) {
        clearTimeout(hideTimeout);
        hideTimeout = null;
      }
    }

    function renderCustomerSuggestions(query = "") {
      if (!customerDropdownOpen) return;
      
      const needle = query.trim().toLowerCase();
      const filtered = customers.filter((n) => !needle || n.toLowerCase().includes(needle)).slice(0, 8);
      
      if (!filtered.length) {
        customerSuggestions.innerHTML = '<div class="px-3 py-2 text-sm text-slate-500">No matching customers</div>';
        customerSuggestions.classList.remove("hidden");
        return;
      }
      
      customerSuggestions.innerHTML = filtered
        .map((name) => `<button type="button" class="customer-option block w-full text-left px-3 py-2 text-sm hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">${escapeHtml(name)}</button>`)
        .join("");
      customerSuggestions.classList.remove("hidden");
      
      // Use mousedown instead of pointerdown for reliability
      customerSuggestions.querySelectorAll(".customer-option").forEach((btn) => {
        btn.addEventListener("mousedown", (event) => {
          event.preventDefault();
          event.stopPropagation();
          customerInput.value = btn.textContent;
          hideCustomerSuggestions();
          // Trigger change/input events
          customerInput.dispatchEvent(new Event('input', { bubbles: true }));
          customerInput.dispatchEvent(new Event('change', { bubbles: true }));
        });
        
        btn.addEventListener("mouseenter", () => cancelHide());
        btn.addEventListener("mouseleave", () => hideCustomerSuggestions());
      });
    }

    async function openCustomerDropdown() {
      cancelHide();
      customerDropdownOpen = true;
      if (!customers.length) {
        try {
          await loadCustomers();
        } catch (error) {
          showToast("Could not load customers", true);
          hideCustomerSuggestions();
          return;
        }
      }
      renderCustomerSuggestions(customerInput.value);
    }

    async function loadRecentCurrentMonthEntries() {
      const selected = dateInput.value ? new Date(dateInput.value) : new Date();
      const monthName = selected.toLocaleString("en-US", { month: "long" });
      const year = selected.getFullYear();
      try {
        const response = await fetch(`/api/entries/recent?month=${encodeURIComponent(monthName)}&year=${year}`);
        if (!response.ok) throw new Error("Failed recent entries");
        const data = await response.json();
        const entries = data.entries || [];
        if (!entries.length) {
          recentEntries.innerHTML = '<p class="text-slate-500">No entries for this month yet.</p>';
          return;
        }
        recentEntries.innerHTML = entries.map((entry) => `
          <div class="rounded-lg border border-slate-200 dark:border-slate-700 p-3">
            <div><strong>${escapeHtml(entry.date)}</strong> - ${escapeHtml(entry.customer_name)}</div>
            <div>Quantity: ${entry.quantity}</div>
            <div>Phones: ${escapeHtml(entry.phone_numbers || "-")}</div>
          </div>`).join("");
      } catch (error) {
        recentEntries.innerHTML = '<p class="text-rose-500">Could not load recent entries.</p>';
      }
    }

    function currentMonthSlug(dateValue) {
      const d = new Date(dateValue);
      return `${d.toLocaleString("en-US", { month: "long" }).toLowerCase()}_${d.getFullYear()}`;
    }

    function updateDownloadLink() {
      if (!dateInput.value) return;
      downloadLink.href = `/api/download/${currentMonthSlug(dateInput.value)}`;
    }

    function setLoading(loading) {
      savingState.classList.toggle("hidden", !loading);
      submitBtn.disabled = loading;
      submitBtn.textContent = loading ? "Saving..." : "Save Entry";
    }

    // Form submission
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const date = dateInput.value;
      const customer_name = customerInput.value.trim();
      const quantity = parseInt(document.getElementById("quantity").value, 10);
      const phone_numbers = Array.from(document.querySelectorAll(".phone-input")).map((x) => x.value.trim()).filter(Boolean);
      
      if (!date || !customer_name || Number.isNaN(quantity)) {
        showToast("Please fill all required fields", true);
        return;
      }
      
      try {
        setLoading(true);
        const response = await fetch("/api/entries", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ date, customer_name, quantity, phone_numbers }),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(formatApiError(data.detail));
        showToast("Entry saved successfully");
        
        // Refresh data
        try {
          await loadCustomers();
        } catch (e) {
          // Ignore refresh failure
        }
        await loadRecentCurrentMonthEntries();
        updateDownloadLink();
        
        // Clear form but keep date and phone row
        customerInput.value = "";
        document.getElementById("quantity").value = "";
        // Clear phone inputs but keep one empty row
        while (phoneContainer.children.length > 1) {
          phoneContainer.removeChild(phoneContainer.lastChild);
        }
        const firstPhone = phoneContainer.querySelector(".phone-input");
        if (firstPhone) firstPhone.value = "";
        
      } catch (error) {
        showToast(error.message || "Could not save entry", true);
      } finally {
        setLoading(false);
      }
    });

    addPhoneBtn.addEventListener("click", () => createPhoneRow());

    themeToggle.addEventListener("change", () => {
      const useDark = themeToggle.checked;
      document.documentElement.classList.toggle("dark", useDark);
      localStorage.setItem("theme", useDark ? "dark" : "light");
    });

    // Customer dropdown event listeners
    customerInput.addEventListener("focus", () => {
      cancelHide();
      openCustomerDropdown();
    });
    
    customerInput.addEventListener("click", (event) => {
      event.stopPropagation();
      cancelHide();
      if (!customerDropdownOpen) {
        openCustomerDropdown();
      }
    });
    
    customerInput.addEventListener("input", () => {
      if (typingTimer) clearTimeout(typingTimer);
      if (customerDropdownOpen) {
        typingTimer = setTimeout(() => {
          renderCustomerSuggestions(customerInput.value);
        }, 100);
      }
    });
    
    customerInput.addEventListener("keydown", (event) => {
      if (event.key === "ArrowDown") {
        event.preventDefault();
        openCustomerDropdown();
      } else if (event.key === "Escape" && customerDropdownOpen) {
        hideCustomerSuggestions();
      }
    });

    customerToggleBtn.addEventListener("mousedown", async (event) => {
      event.preventDefault();
      event.stopPropagation();
      if (customerDropdownOpen) {
        hideCustomerSuggestions();
      } else {
        await openCustomerDropdown();
      }
    });

    // Global click handler with exceptions
    document.addEventListener("mousedown", (event) => {
      const target = event.target;
      
      // Don't close if clicking on suggestion items or toggle button
      if (target.closest('.customer-option') || target.closest('#customerToggleBtn')) {
        return;
      }
      
      if (!customerField.contains(target)) {
        hideCustomerSuggestions();
      } else {
        cancelHide();
      }
    });

    // Prevent scroll from closing dropdown
    customerSuggestions.addEventListener("wheel", (e) => {
      e.stopPropagation();
    });

    // Initialize
    window.addEventListener("DOMContentLoaded", async () => {
      dateInput.value = new Date().toISOString().split("T")[0];
      
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark") {
        document.documentElement.classList.add("dark");
        themeToggle.checked = true;
      }
      
      try {
        await loadCustomers();
      } catch (error) {
        showToast("Could not load customers", true);
      }
      
      await loadRecentCurrentMonthEntries();
      createPhoneRow();
      updateDownloadLink();
      
      dateInput.addEventListener("change", () => {
        updateDownloadLink();
        loadRecentCurrentMonthEntries();
      });
    });
  </script>
</body>
</html>
